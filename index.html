<!DOCTYPE html>
<html lang="ru" style="background:#FBF3EE;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light">
<title>MapLink</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Fraunces:ital,wght@0,400;0,600;1,500&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --cream:#FBF3EE;
    --blush:#F4DCD6;
    --rose:#C57B85;
    --rose-deep:#A85D6B;
    --sage:#A9B79A;
    --sage-deep:#7E9270;
    --gold:#C9A35C;
    --ink:#3A2E2B;
    --muted:#8C7A73;
    --card:#FFFDFB;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{
    color-scheme: only light;
    background:#FBF3EE;
  }
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--cream);
    font-family:'Quicksand',sans-serif;
    color:var(--ink);
    overflow:hidden;
  }
  #app-root{
    position:fixed; inset:0;
    display:flex; flex-direction:column;
  }

  /* ---------------- SPLASH ---------------- */
  #splash{
    position:fixed; inset:0;
    background:#FFFFFF;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center;
    z-index:100;
    transition:opacity .6s ease, visibility .6s ease;
  }
  #splash.hide{ opacity:0; visibility:hidden; pointer-events:none; }
  .eyebrow{
    font-size:12px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--muted); margin-bottom:22px;
  }
  .wobble-line{
    font-family:'Caveat',cursive;
    font-weight:700;
    font-size:46px;
    line-height:1.5;
    color:var(--rose-deep);
    max-width:280px;
    padding:10px 0;
  }
  .wobble-line span{
    display:inline-block;
    animation:wobble 2.6s ease-in-out infinite;
    will-change:transform;
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    transform:translateZ(0);
  }
  @keyframes wobble{
    0%{ transform:translateZ(0) translateY(0) rotate(0deg); }
    25%{ transform:translateZ(0) translateY(-4px) rotate(-3deg); }
    50%{ transform:translateZ(0) translateY(0px) rotate(0deg); }
    75%{ transform:translateZ(0) translateY(3px) rotate(3deg); }
    100%{ transform:translateZ(0) translateY(0) rotate(0deg); }
  }
  .sign{
    position:absolute; bottom:8%;
    font-family:'Caveat',cursive;
    font-size:22px; color:var(--muted);
  }

  /* ---------------- TOP BAR ---------------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 20px 6px;
    flex-shrink:0;
  }
  .topbar .title{
    font-family:'Caveat',cursive; font-weight:700; font-size:26px;
    color:var(--rose-deep);
  }
  .avatar{
    width:32px; height:32px; border-radius:50%;
    background:var(--blush) center/cover no-repeat;
    border:1px solid var(--rose);
  }

  /* ---------------- SCREENS ---------------- */
  .screen{
    flex:1; overflow-y:auto; padding:10px 20px 0;
    display:none;
  }
  .screen.active{ display:block; }
  .placeholder-box{
    margin-top:40px;
    background:var(--card);
    border-radius:20px;
    padding:30px 20px;
    text-align:center;
    color:var(--muted);
    font-size:14px;
    box-shadow:0 6px 16px -8px rgba(58,46,43,.2);
  }
  .placeholder-box b{
    display:block; color:var(--ink); font-family:'Fraunces',serif;
    font-style:italic; font-size:18px; margin-bottom:8px;
  }

  .profile-head{ text-align:center; margin:20px 0 10px;}
  .profile-head .big-avatar{
    width:72px; height:72px; border-radius:50%;
    background:var(--blush) center/cover no-repeat;
    margin:0 auto 10px;
    border:2px solid var(--rose);
  }
  .profile-head .uname{ font-family:'Fraunces',serif; font-style:italic; font-size:21px; }
  .profile-head .handle{ font-size:12px; color:var(--muted); }
  .status-pill{
    display:inline-block; margin-top:10px;
    font-size:11px; padding:4px 12px; border-radius:20px;
    background:var(--blush); color:var(--rose-deep);
  }

  /* ---------------- BOTTOM NAV ---------------- */
  .navbar{
    display:flex; justify-content:space-around; align-items:center;
    padding:12px 0 max(14px, env(safe-area-inset-bottom));
    background:var(--card);
    border-top:1px solid #EEE0D8;
    flex-shrink:0;
  }
  .navitem{
    display:flex; flex-direction:column; align-items:center; gap:3px;
    color:#C9B8AF; background:none; border:none; font-family:inherit;
  }
  .navitem.active{ color:var(--rose-deep); }
  .navitem svg{ width:22px; height:22px; }
  .navitem .nlabel{ font-size:9.5px; font-weight:600; letter-spacing:.02em; }
</style>
</head>
<body style="background:#FBF3EE;">

<div id="app-root" style="background:#FBF3EE;">

  <!-- SPLASH -->
  <div id="splash">
    <div class="eyebrow">Добро пожаловать</div>
    <div class="wobble-line" id="wobbleText"></div>
    <div class="sign">— Tengizka</div>
  </div>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="title" id="topTitle">MapLink</div>
    <div class="avatar" id="topAvatar"></div>
  </div>

  <!-- HOME (globe comes next step) -->
  <div class="screen active" id="screen-home">
    <div class="placeholder-box">
      <b>Здесь будет планета 🌍</b>
      Интерактивный глобус на MapLibre — следующий шаг
    </div>
  </div>

  <!-- FRIENDS -->
  <div class="screen" id="screen-friends">
    <div class="placeholder-box">
      <b>Друзья и рейтинг</b>
      Пока пусто — соберём после базовой карты
    </div>
  </div>

  <!-- PROFILE -->
  <div class="screen" id="screen-profile">
    <div class="profile-head">
      <div class="big-avatar" id="profileAvatar"></div>
      <div class="uname" id="profileName">—</div>
      <div class="handle" id="profileHandle">—</div>
      <div class="status-pill" id="connStatus">проверяю подключение…</div>
    </div>
  </div>

  <!-- NAVBAR -->
  <div class="navbar">
    <button class="navitem active" data-screen="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.7 3.8 6 3.8 9s-1.3 6.3-3.8 9c-2.5-2.7-3.8-6-3.8-9s1.3-6.3 3.8-9z"/></svg>
      <div class="nlabel">Планета</div>
    </button>
    <button class="navitem" data-screen="friends">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8.5" cy="9" r="3"/><circle cx="16" cy="10.5" r="2.3"/><path d="M2.5 19c.6-3.2 3-5 6-5s5.4 1.8 6 5"/><path d="M14.3 14.3c2.2.2 4 1.8 4.5 4.7"/></svg>
      <div class="nlabel">Друзья</div>
    </button>
    <button class="navitem" data-screen="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="8" r="3.4"/><path d="M5 20c1-4 3.8-6 7-6s6 2 7 6"/></svg>
      <div class="nlabel">Профиль</div>
    </button>
  </div>

</div>

<script>
(function(){
  // ---------- wobble text build ----------
  const text = "Specially for\nLinqerin";
  const wobbleEl = document.getElementById('wobbleText');
  let delay = 0;
  text.split('').forEach(ch=>{
    if(ch === '\n'){ wobbleEl.appendChild(document.createElement('br')); return; }
    const span = document.createElement('span');
    span.textContent = ch === ' ' ? '\u00A0' : ch;
    span.style.animationDelay = (delay*0.06)+'s';
    wobbleEl.appendChild(span);
    delay++;
  });

  // hide splash after a bit
  setTimeout(()=>{
    document.getElementById('splash').classList.add('hide');
  }, 2200);

  // ---------- tab switching ----------
  document.querySelectorAll('.navitem').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.navitem').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('screen-'+btn.dataset.screen).classList.add('active');
    });
  });

  // ---------- Telegram WebApp ----------
  const tg = window.Telegram ? window.Telegram.WebApp : null;
  let tgUser = null;
  if(tg){
    tg.ready();
    tg.expand();
    tgUser = tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user : null;
  }
  // fallback for testing outside Telegram
  if(!tgUser){
    tgUser = { id: 'test_'+Math.floor(Math.random()*10000), first_name: 'Гость', username: 'guest', photo_url: '' };
  }

  document.getElementById('profileName').textContent = tgUser.first_name || tgUser.username || 'Пользователь';
  document.getElementById('profileHandle').textContent = tgUser.username ? '@'+tgUser.username : '';
  if(tgUser.photo_url){
    document.getElementById('profileAvatar').style.backgroundImage = `url(${tgUser.photo_url})`;
    document.getElementById('topAvatar').style.backgroundImage = `url(${tgUser.photo_url})`;
  }

  // ---------- Supabase ----------
  const SUPABASE_URL = 'https://wfepsxuvvgfloatrfqba.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmZXBzeHV2dmdmbG9hdHJmcWJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3OTU4MDMsImV4cCI6MjEwMDM3MTgwM30.y774GJ5oDxEzCL_z6gJxSHBR8P3wGfE0qSB4LswiUpk';

  const statusEl = document.getElementById('connStatus');

  if(SUPABASE_ANON_KEY === 'PASTE_ANON_KEY_HERE'){
    statusEl.textContent = 'ключ ещё не подключён';
  } else {
    try{
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      supabase.from('users').upsert({
        telegram_id: String(tgUser.id),
        username: tgUser.username || tgUser.first_name || 'user',
        avatar_url: tgUser.photo_url || null
      }, { onConflict: 'telegram_id' }).then(({error})=>{
        statusEl.textContent = error ? ('ошибка: '+error.message) : 'подключено к базе ✓';
      });
    }catch(e){
      statusEl.textContent = 'ошибка подключения';
    }
  }
})();
</script>

</body>
</html>
